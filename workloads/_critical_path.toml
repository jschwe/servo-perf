flag_threshold_ms = 5

[[edge]]
from = "ServoBuilder::build"
to = "App::open_window"
expected_gap_ms = 1
flag_threshold_ms = 10

[[edge]]
from = "handle_new_top_level_browsing_context"
to = "ScriptThread::new"
expected_gap_ms = 3
flag_threshold_ms = 15

[[edge]]
from = "ScriptThread::pre_page_load"
to = "ServoParser::finish"
expected_gap_ms = 40
flag_threshold_ms = 200
