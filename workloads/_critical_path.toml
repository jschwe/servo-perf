# Critical-path phases for Servo startup to FirstContentfulPaint.
# Names aligned with servo's upstream profiling spans as of
# e2f17e0d28c (after PRs #44443 and #44456). Adjust when servo adds
# or renames startup spans.

[[phase]]
name = "create_platform_window"
owner_thread = "main"

[[phase]]
# Runner always spawns servoshell with `--headless`, so the window
# created is HeadlessWindow (not HeadedWindow).
name = "HeadlessWindow::new"
owner_thread = "main"

[[phase]]
name = "Servo::new"
owner_thread = "main"

[[phase]]
name = "script::init"
owner_thread = "main"

[[phase]]
name = "create_toplevel_webview"
owner_thread = "main"

[[phase]]
name = "handle_new_top_level_browsing_context"
owner_thread = "Constellation"

# Upstream typo in servo's `#[servo_tracing::instrument(name = ...)]`
# (components/script/script_thread.rs). Match what is emitted until the
# upstream typo is fixed.
[[phase]]
name = "ScripThread::new"
owner_thread = "Script"

[[phase]]
name = "pre_page_load"
owner_thread = "Script"

[[phase]]
name = "ServoParser::finish"
owner_thread = "Script"

[[phase]]
name = "Window::reflow"
owner_thread = "Script"

[[phase]]
# perform_updates fires on every main-thread turn (~once per 5 ms),
# so the first-occurrence value is uninformative. Sum all turns in
# the [startup, FCP] window to get total main-thread paint/update time.
name = "perform_updates"
owner_thread = "main"
aggregate = true

[[phase]]
# render() runs inside perform_updates when the frame needs to be
# repainted. Aggregating gives total WebRender + GL time pre-FCP.
name = "render"
owner_thread = "main"
aggregate = true

[[phase]]
name = "FirstPaint"
owner_thread = "main"
is_milestone = true

[[phase]]
name = "FirstContentfulPaint"
owner_thread = "main"
is_milestone = true

# Edges whose observed gap we want to flag when it grows. Order matters.

[[edge]]
from = "create_platform_window"
to = "Servo::new"
expected_gap_ms = 0.5
flag_threshold_ms = 5

[[edge]]
from = "Servo::new"
to = "create_toplevel_webview"
expected_gap_ms = 1
flag_threshold_ms = 10

[[edge]]
from = "handle_new_top_level_browsing_context"
to = "ScripThread::new"
expected_gap_ms = 3
flag_threshold_ms = 15

[[edge]]
from = "pre_page_load"
to = "ServoParser::finish"
expected_gap_ms = 40
flag_threshold_ms = 200

[[edge]]
from = "ServoParser::finish"
to = "Window::reflow"
expected_gap_ms = 1
flag_threshold_ms = 20

[[edge]]
from = "Window::reflow"
to = "FirstPaint"
expected_gap_ms = 40
flag_threshold_ms = 120
